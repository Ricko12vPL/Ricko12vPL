<svg xmlns="http://www.w3.org/2000/svg" width="830" height="74" viewBox="0 0 830 74" role="img" aria-label="II. THE EXPEDITIONS — engineering — systems sent into the wild, still running">
  <style>
    .t{font-family:Georgia,'Times New Roman',serif}
    .m{font-family:'Courier New',ui-monospace,Menlo,monospace}
    @keyframes fi{from{opacity:0}to{opacity:1}}
    @keyframes rx{from{transform:scaleX(0)}to{transform:scaleX(1)}}
    .fi{animation:fi .8s ease both}
    .rule{transform-box:fill-box;transform-origin:left center;animation:rx 1s cubic-bezier(.2,.7,.2,1) .3s both}
    @media (prefers-reduced-motion:reduce){*{animation:none !important}}
  </style>
  <rect x="1" y="1" width="828" height="72" rx="12" fill="#0d1109" stroke="#242d1d"/>
  <path d="M 34 31 L 40 37 L 34 43 L 28 37 Z" fill="none" stroke="#d9a441" stroke-width="1.3" opacity=".8"/>
  <text class="t fi" x="58" y="45" font-size="24" text-anchor="middle" fill="#d9a441">II</text>
  <line x1="88" y1="20" x2="88" y2="54" stroke="#242d1d" stroke-width="1.5"/>
  <text class="t fi" style="animation-delay:.15s" x="108" y="41" font-size="21" letter-spacing="5" fill="#e8dcc0">THE EXPEDITIONS</text>
  <text class="m fi" style="animation-delay:.35s" x="109" y="60" font-size="10.5" letter-spacing="1.5" fill="#78805f">ENGINEERING — SYSTEMS SENT INTO THE WILD, STILL RUNNING</text>
  <g class="rule">
    <line x1="500" y1="37" x2="788" y2="37" stroke="#303a26" stroke-width="1.5"/>
  </g>
  <path class="fi" style="animation-delay:1s" d="M 792 33 L 796 37 L 792 41 L 788 37 Z" fill="#d9a441" opacity=".7"/>
