<svg xmlns="http://www.w3.org/2000/svg" width="830" height="138" viewBox="0 0 830 138" role="img" aria-label="Field notice — open to new expeditions: AI Engineer, ML Engineer, Software Engineer, Quantitative Developer, Research Engineering, Evals and Model Validation, Quant Systems. Open to all locations. CV on request. Current expedition: executable-gate research org, X_Quant live on real markets.">
  <style>
    .t{font-family:Georgia,'Times New Roman',serif}
